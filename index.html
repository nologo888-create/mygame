<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จับคู่มหาสนุก</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Kanit', sans-serif; background: #fff0f5; overflow: hidden; }
        .app { width: 200vw; height: 100vh; display: flex; transition: 0.5s; }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        .card { aspect-ratio: 1/1; background: #ff9a9e; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card.open { background: white; }
        #timer { font-size: 4rem; font-weight: bold; color: #d63031; margin-bottom: 20px; }
        .board { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-height: 300px; overflow-y: auto }
        #profile { margin-bottom: 20px; text-align: center; }
        #profile img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ff6b6b; }
    </style>
</head>
<body>
<audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
<div class="app" id="app">
    <div class="page" id="page1">
        <div id="profile">กำลังโหลดข้อมูล LINE...</div>
        <h1>🏆 TOP 10</h1>
        <div class="board" id="leaderboard">ตารางจัดอันดับ...</div>
        <div id="myRankStatus" style="margin-top:20px; font-size:1.3rem; font-weight:bold; color:#ff4757;"></div>
        <button onclick="document.getElementById('app').style.transform='translateX(-100vw)'; startGame();" style="padding:15px 40px; margin-top:20px; font-size:1.5rem; border-radius:30px; border:none; background:#06c755; color:white;">เริ่มเกม</button>
    </div>
    <div class="page" id="page2">
        <div id="timer">00:00</div>
        <div class="grid" id="grid"></div>
    </div>
</div>
<script>
    const MY_LIFF_ID = "2010315417-VgfsSvz5";
    let user = { name: "Guest", pic: "" };

    // 1. ฟังก์ชันโหลด Leaderboard
    // 1. ฟังก์ชันโหลด Leaderboard (แก้ไขให้ถูกต้อง)
    function loadLeaderboard() {
        fetch("https://script.google.com/macros/s/AKfycbx0MU4lHie2XfiAWbaFWPTqncntH-LLZzdok6yGdAtlZjfq7pvwmPJXYJ2lGpB8kXaa/exec")
        .then(res => res.json())
        .then(data => {
            data.sort((a, b) => a[2] - b[2]); 
            
            let html = "<table style='width:100%; text-align:left; border-collapse: collapse;'>";
            
            const pastelColors = [
                '#ffcdd2', '#f8bbd0', '#e1bee7', '#d1c4e9', '#c5cae9', 
                '#b3e5fc', '#b2ebf2', '#c8e6c9', '#dcedc8', '#fff9c4'
            ];

            data.forEach((row, index) => {
                let bgColor = "";
                let isMe = (row[0].trim() === user.name.trim());

                if (index < 10) {
                    bgColor = `background: ${pastelColors[index % 10]};`;
                }

                let rowStyle = isMe ? 
                    `style='${bgColor} border: 3px solid #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.5); font-weight: 900; color: #d63031;'` : 
                    `style='${bgColor}'`;

                html += `<tr ${rowStyle}>
                            <td style='padding:8px;'>${index+1}. ${row[0]}</td>
                            <td style='text-align:right; padding:8px;'>${row[2]} วิ</td>
                         </tr>`;
            });
            
            html += "</table>";
            document.getElementById('leaderboard').innerHTML = html;
            
            let myIndex = data.findIndex(row => row[0].trim() === user.name.trim());
            if (myIndex !== -1) {
                document.getElementById('myRankStatus').innerText = `อันดับของคุณ: ที่ ${myIndex + 1} จาก ${data.length} คน`;
            }
        });
    }
    // 2. เริ่มต้นระบบ LINE
    liff.init({ liffId: MY_LIFF_ID }).then(() => {
        loadLeaderboard();
        if (!liff.isLoggedIn()) { liff.login(); }
        else { liff.getProfile().then(p => { 
            user = { name: p.displayName, pic: p.pictureUrl };
            document.getElementById('profile').innerHTML = `<img src="${p.pictureUrl}"><br>สวัสดีคุณ ${p.displayName}`;
        }); }
    });

    // 3. ระบบเกม
    const foodIcons = ['🍎', '🍕', '🍔', '🍟', '🍦', '🍩', '🍣', '🍱', '🍤', '🍜'];
    let cards = [], flipped = [], matched = 0, timer = 0, interval;

    function startGame() {
        clearInterval(interval);
        interval = null;
        timer = 0; matched = 0; flipped = [];
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('bgMusic').currentTime = 0;
        document.getElementById('bgMusic').play();
        
        cards = [...foodIcons, ...foodIcons].sort(() => Math.random() - 0.5);
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        cards.forEach(icon => {
            const div = document.createElement('div'); div.className = 'card';
            div.onclick = () => {
                if(!interval) { interval = setInterval(() => { timer++; document.getElementById('timer').innerText = timer; }, 1000); }
                if(flipped.length < 2 && !div.classList.contains('open')) {
                    div.innerHTML = icon; div.classList.add('open'); flipped.push({div, icon});
                    if(flipped.length === 2) checkMatch();
                }
            };
            grid.appendChild(div);
        });
    }

    function checkMatch() {
        if(flipped[0].icon === flipped[1].icon) {
            matched++; flipped = [];
            if(matched === 10) {
                clearInterval(interval);
                document.getElementById('bgMusic').pause();
                confetti({ particleCount: 500, spread: 200, origin: { y: 0.6 } });
                
                // ส่งคะแนน
                fetch("https://script.google.com/macros/s/AKfycbx0MU4lHie2XfiAWbaFWPTqncntH-LLZzdok6yGdAtlZjfq7pvwmPJXYJ2lGpB8kXaa/exec", {
                    method: "POST",
                    body: JSON.stringify({ name: user.name, pic: user.pic, time: timer })
                });

                const popup = document.createElement('div');
                popup.style.cssText = "position:fixed; top:20%; left:10%; width:80%; background:white; padding:20px; border-radius:20px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.3); z-index:1000; font-size:1.2rem;";
                popup.innerHTML = `<h2>🎉 เยี่ยมมาก!</h2><p>คุณ ${user.name} ทำเวลาได้ <b>${timer} วินาที</b></p><button onclick="this.parentElement.remove(); document.getElementById('app').style.transform='translateX(0)'; loadLeaderboard();" style="padding:10px 20px; background:#06c755; color:white; border:none; border-radius:10px;">ตกลง</button>`;
                document.body.appendChild(popup);
            }
        } else {
            setTimeout(() => { flipped.forEach(f => { f.div.innerHTML = ''; f.div.classList.remove('open'); }); flipped = []; }, 500);
        }
    }
</script>
</body>
</html>
