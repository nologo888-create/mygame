<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมส์จับคู่ ร้านเช็คอิน ตามสั่ง</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap');
        body { background: #fff5e6; font-family: 'Kanit', sans-serif; text-align: center; color: #ff6f9c; padding: 5px; margin: 0; }
        #profile-area { margin: 5px auto; font-size: 24px; font-weight: bold; }
        #timer { font-size: 80px !important; font-weight: bold; color: #ff6f9c; }
        #rank-display { font-size: 28px; font-weight: bold; color: #ff6f9c; margin-bottom: 5px; }
        #profile-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #ffcc80; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 98vw; margin: 10px auto; background: #ffe4e1; padding: 12px; border-radius: 20px; box-sizing: border-box; }
        .card { width: 100%; aspect-ratio: 1 / 1; cursor: pointer; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 130px; box-shadow: 0 6px 8px rgba(0,0,0,0.2); }
        .front { background: #ff6f9c; color: white; border: 5px solid #ff9aa2; }
        .back { background: #fff; border: 5px solid #ffcc80; transform: rotateY(180deg); }
        
        #leaderboard { width: 96vw; margin: 15px auto; background: white; padding: 20px; border-radius: 20px; border: 4px solid #ffcc80; box-sizing: border-box; }
        table { width: 100%; font-size: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 2px solid #ffcc80; }
    </style>
</head>
<body>
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#fff5e6; display:flex; align-items:center; justify-content:center; z-index:999;">
        <button onclick="startGame()" style="padding:40px 80px; font-size:45px; background:#ff6f9c; color:white; border:none; border-radius:50px; cursor:pointer;">เริ่มเกม!</button>
    </div>
    <h1>ร้านเช็คอิน ตามสั่ง</h1> 
    <div id="profile-area">
        <img id="profile-img" src="https://via.placeholder.com/80" alt="รูป">
        <p>ผู้เล่น: <span id="player-name">...</span><br>เวลา: <span id="timer">0</span> วิ</p> 
        <div id="rank-display"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div id="leaderboard">
        <h3>🏆 Top 10 Rankings</h3>
        <table id="lb-table"><thead><tr><th>อันดับ</th><th>ชื่อ</th><th>เวลา</th></tr></thead><tbody id="lb-body"></tbody></table>
    </div>
    <audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoPCNkXMG41vrRZfuMxafAYSGeRXb2p59SAHMmpED-jFf96I-rSwhINzLLy6vUcITDLg/exec";
        const foods = ['🍕', '🍔', '🍟', '🍦', '🍩', '🍣', '🍜', '🍱', '🍰', '🍹'];
        let deck = [...foods, ...foods].sort(() => Math.random() - 0.5);
        let flipped = [], matched = 0, timer = 0, timerInt = null, playerName = "ผู้เล่น", isGameStarted = false;

        async function startGame() {
            document.getElementById('bgm').play();
            document.getElementById('start-screen').style.display = 'none';
            await liff.init({ liffId: "2010315417-OMarJSDY" });
            if (liff.isLoggedIn()) {
                const p = await liff.getProfile();
                playerName = p.displayName;
                document.getElementById('player-name').innerText = playerName;
                document.getElementById('profile-img').src = p.pictureUrl;
            }
            createBoard(); loadLeaderboard();
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            deck.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-inner"><div class="front">✿</div><div class="back">${icon}</div></div>`;
                card.onclick = function() {
                    if (!isGameStarted) {
                        isGameStarted = true;
                        timerInt = setInterval(() => { timer++; document.getElementById('timer').innerText = timer; }, 1000);
                    }
                    if (flipped.length >= 2 || this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    flipped.push({card: this, icon: icon});
                    if (flipped.length === 2) {
                        if (flipped[0].icon === flipped[1].icon) {
                            matched += 2; flipped = [];
                            if (matched === 20) winGame();
                        } else {
                            setTimeout(() => { flipped.forEach(f => f.card.classList.remove('flipped')); flipped = []; }, 800);
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        function winGame() {
            clearInterval(timerInt);
            document.getElementById('bgm').pause();
            confetti();
            
            // ใช้ JSONP เพื่อดึงข้อมูลมาเช็คสถิติ
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=get&callback=checkRecord`;
            document.body.appendChild(script);
        }

        function checkRecord(data) {
            const myPrev = data.find(r => r.name === playerName);
            let message = `เกมจบแล้ว! คุณทำเวลาได้ ${timer} วินาที`;
            
            if (myPrev && myPrev.time < timer) {
                message += `\nเสียใจด้วย คุณยังทำลายสถิติเก่า (${myPrev.time} วิ) ของตัวเองไม่ได้ครับ`;
            } else {
                message += `\nยอดเยี่ยม! คุณทำลายสถิติใหม่ได้แล้ว!`;
            }
            
            alert(message);
            new Image().src = `${SCRIPT_URL}?action=save&name=${encodeURIComponent(playerName)}&time=${timer}`;
            setTimeout(loadLeaderboard, 1500);
        }

        function loadLeaderboard() {
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=get&callback=displayLB`;
            document.body.appendChild(script);
        }

        function displayLB(data) {
            let myRank = data.findIndex(r => r.name === playerName) + 1;
            document.getElementById('rank-display').innerText = myRank > 0 ? `อันดับของคุณ: ที่ ${myRank}` : "";
            document.getElementById('lb-body').innerHTML = data.slice(0, 10).map((r, i) => `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.time}</td></tr>`).join('');
        }
    </script>
</body>
</html>
