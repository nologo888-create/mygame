<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมส์จับคู่ ร้านเช็คอิน ตามสั่ง</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap');
        body { background: #fff5e6; font-family: 'Kanit', sans-serif; text-align: center; color: #ff6f9c; padding: 20px; }
        #profile-area { margin: 10px auto; font-size: 30px; font-weight: bold; }
        #timer { font-size: 70px !important; font-weight: bold; color: #ff6f9c; }
        #profile-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #ffcc80; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 95vw; max-width: 600px; margin: 20px auto; background: #ffe4e1; padding: 15px; border-radius: 25px; }
        .card { width: 100%; aspect-ratio: 1 / 1; cursor: pointer; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 80px !important; box-shadow: 0 6px 10px rgba(0,0,0,0.15); }
        .front { background: #ffb7c5; color: white; border: 10px solid #ff9aa2; }
        .back { background: #fff; border: 4px solid #ffcc80; transform: rotateY(180deg); }
        #leaderboard { max-width: 95vw; margin: 20px auto; background: white; color: #ff6f9c; padding: 20px; border-radius: 20px; border: 3px solid #ffcc80; font-size: 22px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ffcc80; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255, 245, 230, 0.95); display:flex; align-items:center; justify-content:center; z-index:999; }
    </style>
</head>
<body>
    <div id="start-screen"><button onclick="startGame()" style="padding:25px 50px; font-size:30px; background:#ff6f9c; color:white; border:none; border-radius:30px; cursor:pointer;">พร้อมแล้ว ไปเลย!</button></div>
    <h1>ร้านเช็คอิน ตามสั่ง</h1> 
    <div id="profile-area">
        <img id="profile-img" src="https://via.placeholder.com/60" alt="รูปโปรไฟล์">
        <p>ผู้เล่น: <span id="player-name">...</span><br>เวลา: <span id="timer">0</span> วิ</p> 
    </div>
    <div class="grid" id="grid"></div>
    <div id="leaderboard">
        <h3>🏆 Top 10 Rankings</h3>
        <table style="width:100%"><thead><tr><th>อันดับ</th><th>ชื่อ</th><th>เวลา</th></tr></thead><tbody id="lb-body"></tbody></table>
    </div>

    <audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const foods = ['🍕', '🍔', '🍟', '🍦', '🍩', '🍣', '🍜', '🍱', '🍰', '🍹'];
        let deck = [...foods, ...foods].sort(() => Math.random() - 0.5);
        let flipped = [], matched = 0, timer = 0, timerInt = null, playerName = "ผู้เล่น", isGameStarted = false;

        async function startGame() {
            document.getElementById('bgm').play();
            document.getElementById('start-screen').style.display = 'none';
            await init();
        }

        async function init() {
            try {
                await liff.init({ liffId: "2010315417-OMarJSDY" });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const p = await liff.getProfile();
                playerName = p.displayName;
                document.getElementById('player-name').innerText = playerName;
                document.getElementById('profile-img').src = p.pictureUrl;
            } catch(e) { console.error(e); }
            createBoard();
            loadLeaderboard();
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            deck.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-inner"><div class="front">✿</div><div class="back">${icon}</div></div>`;
                card.onclick = function() {
                    if (!isGameStarted) {
                        isGameStarted = true;
                        timerInt = setInterval(() => { timer++; document.getElementById('timer').innerText = timer; }, 1000);
                    }
                    if (flipped.length >= 2 || this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    flipped.push({card: this, icon: icon});
                    if (flipped.length === 2) {
                        if (flipped[0].icon === flipped[1].icon) {
                            matched += 2; flipped = [];
                            if (matched === 20) winGame();
                        } else {
                            setTimeout(() => { flipped.forEach(f => f.card.classList.remove('flipped')); flipped = []; }, 800);
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        async function winGame() {
            clearInterval(timerInt);
            document.getElementById('bgm').pause();
            confetti();
            await saveScore(playerName, timer);
            const response = await fetch("https://script.google.com/macros/s/AKfycbzaXSIYFL48WHv7o6MMgYjDyd1j0ThiiKbJJaMKoT6i3t3pKtdthjC8rlVd1yeo_4uXpA/exec");
            const allScores = await response.json();
            allScores.sort((a, b) => a[2] - b[2]);
            const myRank = allScores.findIndex(row => row[1] === playerName && row[2] == timer) + 1;
            alert(`เกมจบแล้ว! คุณทำเวลาได้ ${timer} วินาที\nคุณอยู่อันดับที่: ${myRank}`);
        }

        async function loadLeaderboard() {
            const response = await fetch("https://script.google.com/macros/s/AKfycbzaXSIYFL48WHv7o6MMgYjDyd1j0ThiiKbJJaMKoT6i3t3pKtdthjC8rlVd1yeo_4uXpA/exec");
            const data = await response.json();
            const top10 = data.slice(0, 10);
            document.getElementById('lb-body').innerHTML = top10.map((r, i) => `<tr><td>${i+1}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
        }

        async function saveScore(name, time) {
            await fetch("https://script.google.com/macros/s/AKfycbzaXSIYFL48WHv7o6MMgYjDyd1j0ThiiKbJJaMKoT6i3t3pKtdthjC8rlVd1yeo_4uXpA/exec", { 
                 method: 'POST', 
                 body: JSON.stringify({ name: name, time: time }) });
            loadLeaderboard();
        }
    </script>
</body>
</html>
