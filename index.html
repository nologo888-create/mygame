<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมส์จับคู่ ร้านเช็คอิน ตามสั่ง</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap');
        body { background: #fff5e6; font-family: 'Kanit', sans-serif; text-align: center; color: #ff6f9c; padding: 5px; margin: 0; }
        .page { display: none; padding: 10px; }
        .active { display: block; }
        #timer { font-size: 80px; font-weight: bold; color: #ff6f9c; }
        .rank-info { font-size: 26px; font-weight: bold; margin: 10px 0; color: #ff6f9c; background: #ffe4e1; padding: 10px; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 95vw; margin: 10px auto; }
        .card { width: 100%; aspect-ratio: 1 / 1; cursor: pointer; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 130px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .front { background: #ff6f9c; color: white; border: 4px solid #ff9aa2; }
        .back { background: #fff; border: 4px solid #ffcc80; transform: rotateY(180deg); }
        #leaderboard { width: 95vw; margin: 10px auto; background: white; padding: 15px; border-radius: 20px; border: 3px solid #ffcc80; }
        table { width: 100%; font-size: 22px; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #ffcc80; }
        button { padding: 20px 40px; font-size: 25px; background: #ff6f9c; color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="page-game" class="page active">
        <h1>ร้านเช็คอิน ตามสั่ง</h1>
        <div id="my-rank-page1" class="rank-info">กำลังโหลด...</div>
        <p id="timer">เวลา: 0 วิ</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="page-result" class="page">
        <h1>สรุปคะแนนของคุณ</h1>
        <div id="my-rank-page2" class="rank-info"></div>
        <div id="leaderboard">
            <h3>🏆 Top 10 Rankings</h3>
            <table id="lb-table"><thead><tr><th>อันดับ</th><th>ชื่อ</th><th>เวลา</th></tr></thead><tbody id="lb-body"></tbody></table>
        </div>
        <br>
        <button onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>

    <audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoPCNkXMG41vrRZfuMxafAYSGeRXb2p59SAHMmpED-jFf96I-rSwhINzLLy6vUcITDLg/exec";
        const foods = ['🍕', '🍔', '🍟', '🍦', '🍩', '🍣', '🍜', '🍱', '🍰', '🍹'];
        let deck = [...foods, ...foods].sort(() => Math.random() - 0.5);
        let flipped = [], matched = 0, timer = 0, timerInt = null, playerName = "ผู้เล่น";

        async function init() {
            await liff.init({ liffId: "2010315417-OMarJSDY" });
            if (liff.isLoggedIn()) { const p = await liff.getProfile(); playerName = p.displayName; }
            createBoard();
            loadLeaderboard();
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            deck.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-inner"><div class="front">✿</div><div class="back">${icon}</div></div>`;
                card.onclick = function() {
                    if (!timerInt) { document.getElementById('bgm').play(); timerInt = setInterval(() => { timer++; document.getElementById('timer').innerText = "เวลา: " + timer + " วิ"; }, 1000); }
                    if (flipped.length >= 2 || this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    flipped.push({card: this, icon: icon});
                    if (flipped.length === 2) {
                        if (flipped[0].icon === flipped[1].icon) {
                            matched += 2; flipped = [];
                            if (matched === 20) winGame();
                        } else {
                            setTimeout(() => { flipped.forEach(f => f.card.classList.remove('flipped')); flipped = []; }, 800);
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        function winGame() {
            clearInterval(timerInt);
            document.getElementById('bgm').pause();
            confetti();
            new Image().src = `${SCRIPT_URL}?action=save&name=${encodeURIComponent(playerName)}&time=${timer}`;
            alert("บันทึกคะแนนเรียบร้อย!");
            document.getElementById('page-game').classList.remove('active');
            document.getElementById('page-result').classList.add('active');
            loadLeaderboard();
        }

        function loadLeaderboard() {
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=get&callback=displayLB`;
            document.body.appendChild(script);
        }

        function displayLB(data) {
            let myIndex = data.findIndex(r => r.name === playerName);
            let rankText = myIndex >= 0 ? `อันดับของคุณ: ที่ ${myIndex + 1} (${data[myIndex].time} วินาที)` : "ยังไม่มีอันดับ";
            document.getElementById('my-rank-page1').innerText = rankText;
            document.getElementById('my-rank-page2').innerText = rankText;
            
            document.getElementById('lb-body').innerHTML = data.slice(0, 10).map((r, i) => `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.time}</td></tr>`).join('');
            if (myIndex >= 10) {
                document.getElementById('lb-body').innerHTML += `<tr style="background:#fff5e6; font-weight:bold;"><td>${myIndex + 1}</td><td>${playerName} (คุณ)</td><td>${data[myIndex].time}</td></tr>`;
            }
        }
        init();
    </script>
</body>
</html>
